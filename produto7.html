<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Carrinho</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#c79cab;
}

a{
  text-decoration:none;
  color:inherit;
}


.topo{
  background:#c79cab;
  display:flex;
  justify-content:space-around;
  padding:8px;
  font-size:12px;
}

.meio-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 40px;
  background:#c79cab;
}

.logo{height:80px;}

.busca{
  display:flex;
  width:40%;
}

.busca input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px 0 0 5px;
}

.busca button{
  background:#ff69b4;
  color:white;
  border:none;
  padding:10px;
  border-radius:0 5px 5px 0;
  cursor:pointer;
}


.container{
  background:white;
  margin:30px;
  padding:20px;
  border-radius:10px;
}

h1{
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
}

th, td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

th{
  background:#ff69b4;
  color:white;
}

button{
  background:#ff69b4;
  color:white;
  border:none;
  padding:10px 15px;
  cursor:pointer;
  border-radius:6px;
}

.total{
  font-size:20px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="topo">
  <a href="#">📍 Rastreie seu pedido</a>
  <a href="#">💬 Fale conosco</a>
  <span>📱 WhatsApp (12) 994002-8922</span>
  <span>📞 Telefone 4002-8922</span>
</div>

<div class="meio-header">
  <a href="Make Casual Chique.html">
    <img src="fotos/logo.png" class="logo">
  </a>

  <div class="busca">
    <input placeholder="Buscar">
    <button>Buscar</button>
  </div>

  <div>
    <a href="#">👤 Conta</a><br>
    <a href="carrinho.html">🛒 Carrinho</a>
  </div>
</div>

<div class="container">
    <h1>🛒 Carrinho</h1>

    <table>
        <tr>
            <th>Produto</th>
            <th>Preço</th>
            <th>Qtd</th>
            <th>Total</th>
            <th>Ação</th>
        </tr>
        <tbody id="lista"></tbody>
    </table>

    <p class="total">Total: <span id="total">R$ 0</span></p>

    <button onclick="finalizar()">Finalizar Compra</button>
</div>

<script>
function getCarrinho(){
  return JSON.parse(localStorage.getItem("carrinho")) || [];
}

function salvarCarrinho(carrinho){
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

function mostrarCarrinho(){
  let carrinho = getCarrinho();
  let lista = document.getElementById("lista");
  let totalGeral = 0;

  lista.innerHTML = "";

  carrinho.forEach((item, i) => {
    let totalItem = item.preco * item.quantidade;
    totalGeral += totalItem;

    lista.innerHTML += `
      <tr>
        <td>${item.nome}</td>
        <td>R$ ${item.preco}</td>
        <td>${item.quantidade}</td>
        <td>R$ ${totalItem}</td>
        <td><button onclick="remover(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = "R$ " + totalGeral;
}

function remover(i){
  let carrinho = getCarrinho();
  carrinho.splice(i, 1);
  salvarCarrinho(carrinho);
  mostrarCarrinho();
}

function finalizar(){
  alert("💖 Compra finalizada!");
  localStorage.removeItem("carrinho");
  mostrarCarrinho();
}

window.onload = mostrarCarrinho;
</script>

</body>
</html>
