<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>VIDA_ACADEMICA</title>
    <style>
        body {
            background-color: #000000;
            color: #F8F8FF;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .titulo-maju {
            font-family: 'Brush Script MT', cursive;
            font-size: 80px; 
            color: #ffb4e0;
            text-shadow:
                2px 2px 4px #ff69b4,
                0 0 10px #ff69b4;
            margin-top: 40px;
            display: inline-block;
        }

        .linha-titulo {
            width: 00px;
            border: none;
            border-bottom: 3px solid #F8F8FF;
            margin: 0 auto 30px;
        }

        .botao {
            display: inline-block;
            background-color: #ff69b4;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            border-radius: 20px;
            font-size: 18px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .botao:hover {
            background-color: #ff1493;
            transform: scale(1.05);
        }

      
        .insta {
            margin-top: 20px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .insta a {
            color: #ff69b4;
            text-decoration: none;
            font-weight: bold;
        }

        .insta a:hover {
            text-decoration: underline;
        }

        
        .botao-inicio {
            background-color: #ff69b4;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .botao-inicio:hover {
            background-color: #ff1493;
            transform: scale(1.05);
            color: white;
        }

        video {
            border-radius: 12px;
            box-shadow: 0 0 15px #ff69b4aa;
        }

        .secao {
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <hr class="linha-titulo" />

</video>

        </div>
    </div>

</body>
</html>
