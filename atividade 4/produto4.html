<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produto4</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#c79cab;
}

a{
  text-decoration:none;
  color:inherit;
}

.topo{
  background:#c79cab;
  display:flex;
  justify-content:space-around;
  padding:8px;
  font-size:12px;
}

.meio-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 40px;
}

.logo{height:80px;}

.busca{
  display:flex;
  width:40%;
}

.busca input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px 0 0 5px;
}

.busca button{
  background:#ff69b4;
  color:white;
  border:none;
  padding:10px;
  border-radius:0 5px 5px 0;
  cursor:pointer;
}

.produto{
  display:flex;
  gap:40px;
  padding:40px;
  background:white;
  margin:30px;
  border-radius:10px;
}

.imagem{
  position:relative;
}

.imagem img{
  width:400px;
  height:400px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#ff69b4;
  color:white;
  border:none;
  padding:10px 15px;
  cursor:pointer;
  border-radius:50%;
  font-size:18px;
}

.left{ left:-10px; }
.right{ right:-10px; }

.detalhes{
  max-width:400px;
}

.preco{
  color:#e60023;
  font-size:28px;
  margin:10px 0;
}

.botao{
  background:#ff69b4;
  color:white;
  padding:15px;
  border:none;
  width:100%;
  cursor:pointer;
  border-radius:8px;
}

.descricao{
  background:white;
  margin:30px;
  padding:20px;
  border-radius:10px;
}

.carrossel{
  position:relative;
  margin:30px;
}

.cards{
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-behavior:smooth;
}

.cards::-webkit-scrollbar{
  display:none;
}

.card{
  min-width:260px;
  height:420px;
  background:#eeeeee;
  border-radius:12px;
  padding:15px;
  text-align:center;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:10px;
}

.card p{
  font-size:14px;
}

.card strong{
  color:red;
}

</style>
</head>

<body>

<div class="topo">
  <a href="">📍 Rastreie seu pedido</a>
  <a href="">💬 Fale conosco</a>
  <span>📱 WhatsApp</span>
</div>

<div class="meio-header">
  <img src="fotos/logo.png" class="logo">

  <div class="busca">
    <input placeholder="Buscar">
    <button>Buscar</button>
  </div>

  <div>
    <a href="">👤 Conta</a><br>
    <a href="carrinho.html">🛒 Carrinho</a>
  </div>
</div>

<div class="produto">

  <div class="imagem">
    <button class="btn left" onclick="trocarImagem(-1)">❮</button>

    <img id="imgPrincipal" src="produtos/contorno1.webp">

    <button class="btn right" onclick="trocarImagem(1)">❯</button>
  </div>

  <div class="detalhes">
    <h2>Contorno Chique</h2>
    <div class="preco">R$209,00</div>
    <input type="number" value="1" min="1">
    <br><br>
    <button class="botao" onclick="comprar()">Comprar</button>
  </div>

</div>

<div class="descricao">
  <h3>Descrição</h3>
  <p>
    O melhor contorno para sua pele.
    Cremosa e com uma pigmentação maravilhosa.
  </p>
</div>

<div class="carrossel">

<button class="btn left" onclick="scrollCards(-1)">❮</button>

<div class="cards" id="cards">

<a href="produto1.html">
<div class="card">
<img src="produtos/base1.jpg">
<p>Base Reboco</p>
<strong>R$ 380,00</strong>
</div>
</a>

<a href="produto2.html">
<div class="card">
<img src="produtos/blush1.avif">
<p>Blush Chinelada</p>
<strong>R$ 99,00</strong>
</div>
</a>

<a href="produto3.html">
<div class="card">
<img src="produtos/cola1.webp">
<p>Batom cola</p>
<strong>R$ 170,00</strong>
</div>
</a>

</div>

<button class="btn right" onclick="scrollCards(1)">❯</button>

</div>

<script>

function comprar(){
  alert("Produto adicionado ao carrinho!");
}

let imagens = [
  "produtos/contorno1.webp",
  "produtos/contorno2.jpg",
  "produtos/contorno3.avif"
];

let index = 0;

function trocarImagem(direcao){
  index += direcao;

  if(index < 0) index = imagens.length - 1;
  if(index >= imagens.length) index = 0;

  document.getElementById("imgPrincipal").src = imagens[index];
}

function scrollCards(direction){
  const container = document.getElementById("cards");

  container.scrollBy({
    left: direction * 300,
    behavior: "smooth"
  });
}

</script>

</body>
</html>
